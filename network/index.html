<style>

  svg { width: 100vw; height: 100vh; }
</style>
</head>

<div id="tooltip"></div>

л", "вес": 3}, {"источник": "Альфа-Банк", "цель": "ВТБ", "вес": 2}, {"источник": "Альфа-Банк", "цель": "ПИК", "вес": 2}, {"источник": "Альфа-Банк", "цель": "Сбер", "вес": 2}, {"источник": "ВТБ", "цель": "Московская биржа", "вес": 2}, {"источник": "ВТБ", "цель": "ПИК", "вес": 2}, {"источник": "ВТБ", "цель": "Сбер", "вес": 3}, {"источник": "Московская биржа", "цель": "ПИК", "вес": 2}, {"источник": "Московская биржа", "цель": "Сбер", "вес": 4}, {"источник": "Московская биржа", "цель": "Селектел", "вес": 2}, {"источник": "ПИК", "цель": "Сбер", "вес": 2}, {"источник": "Московская биржа", "цель": "Перекрёсток", "вес": 2}, {"источник": "Московская биржа", "цель": "Пятёрочка", "вес": 2}, {"источник": "Перекрёсток", "цель": "Пятёрочка", "вес": 2}, {"источник": "Перекрёсток", "цель": "Россия", "вес": 2}, {"источник": "Пятёрочка", "цель": "Россия", "вес": 2}, {"источник": "223-ФЗ", "цель": "44-ФЗ", "вес": 2}, {"источник": "223-ФЗ", "цель": "Московская биржа", "вес": 2}, {"источник": "44-ФЗ", "цель": "Московская биржа", "вес": 2}, {"источник": "Kaspersky", "цель": "Московская биржа", "вес": 2}, {"источник": "Ericsson", "цель": "Huawei", "вес": 2}, {"источник": "Ericsson", "цель": "МТС", "вес": 2}, {"источник": "Ericsson", "цель": "Россия", "вес": 2}, {"источник": "Huawei", "цель": "МТС", "вес": 2}, {"источник": "Huawei", "цель": "Россия", "вес": 2}, {"источник": "МТС", "цель": "Россия", "вес": 3}, {"источник": "Газпром", "цель": "СИБУР", "вес": 2}, {"источник": "Россия", "цель": "СИБУР", "вес": 3}, {"источник": "Россия", "цель": "Силовые машины", "вес": 3}, {"источник": "Россия", "цель": "ФосАгро", "вес": 2}, {"источник": "НЛМК", "цель": "ОМК", "вес": 2}, {"источник": "НЛМК", "цель": "РЖД", "вес": 2}, {"источник": "НЛМК", "цель": "Россия", "вес": 2}, {"источник": "ОМК", "цель": "РЖД", "вес": 3}, {"источник": "ОМК", "цель": "Россия", "вес": 3}, {"источник": "ОМК", "цель": "ТМК", "вес": 2}, {"источник": "РЖД", "цель": "Россия", "вес": 5}, {"источник": "РЖД", "цель": "ТМК", "вес": 2}, {"источник": "Россия", "цель": "ТМК", "вес": 3}, {"источник": "Мурманская область", "цель": "Россия", "вес": 2}, {"источник": "MOEX", "цель": "МТС", "вес": 2}, {"источник": "ВТБ", "цель": "Россия", "вес": 3}, {"источник": "МТС", "цель": "Ростелеком", "вес": 2}, {"источник": "MOEX", "цель": "Сбер", "вес": 2}, {"источник": "Московская биржа", "цель": "Сбер Страхование", "вес": 2}, {"источник": "Россия", "цель": "Сбер", "вес": 4}, {"источник": "Россия", "цель": "Сбер Страхование", "вес": 2}, {"источник": "ЛСР", "цель": "ПИК", "вес": 2}, {"источник": "ЛСР", "цель": "Россия", "вес": 2}, {"источник": "ПИК", "цель": "Россия", "вес": 2}, {"источник": "MOEX", "цель": "Газпром", "вес": 2}, {"источник": "MOEX", "цель": "Лукойл", "вес": 2}, {"источник": "Лукойл", "цель": "Московская биржа", "вес": 2}, {"источник": "Лукойл", "цель": "Россия", "вес": 2}, {"источник": "Московская биржа", "цель": "Роснефть", "вес": 2}, {"источник": "Роснефть", "цель": "Россия", "вес": 3}, {"источник": "Китай", "цель": "Россия", "вес": 2}, {"источник": "Китай", "цель": "СИБУР", "вес": 2}, {"источник": "Евросибэнерго", "цель": "Россия", "вес": 2}, {"источник": "Норникель", "цель": "Россия", "вес": 2}]};

// Маппинг русских ключей JSON во внутренние английские для D3.js
fullData.узлы.forEach(n => {
  n.id = n.имя; n.count = n.упоминания;
  n.category_label = n.метка_категории; n.color = n.цвет;
});
fullData.связи.forEach(l => {
  l.source = l.источник; l.target = l.цель; l.weight = l.вес;
});
fullData.nodes = fullData.узлы;
fullData.links = fullData.связи;
const width = window.innerWidth, height = window.innerHeight;

const svg = d3.select("svg");
const g = svg.append("g");

  // Масштабирование
svg.call(d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => g.attr("transform", e.transform)));

const tooltip = d3.select("#tooltip");
let simulation, linkG, nodeG, labelG;

function render(minWeight) {
  const links = fullData.links.filter(l => l.weight >= minWeight);
  const activeIds = new Set();
  links.forEach(l => { activeIds.add(l.source.id || l.source); activeIds.add(l.target.id || l.target); });
  const nodes = fullData.nodes.filter(n => activeIds.has(n.id));

  d3.select("#stats").html(`Узлы: ${nodes.length} | Связи: ${links.length}`);

  g.selectAll("*").remove();

  // Масштаб
  const maxCount = d3.max(nodes, d => d.count) || 1;
  const rScale = d3.scaleSqrt().domain([1, maxCount]).range([4, 40]);
  const maxWeight = d3.max(links, l => l.weight) || 1;
  const wScale = d3.scaleLinear().domain([minWeight, maxWeight]).range([0.5, 4]);
  const oScale = d3.scaleLinear().domain([minWeight, maxWeight]).range([0.15, 0.6]);

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80).strength(0.3))
    .force("charge", d3.forceManyBody().strength(-150))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => rScale(d.count) + 2));

  linkG = g.append("g").selectAll("line").data(links).join("line")
    .attr("stroke", "#555").attr("stroke-opacity", d => oScale(d.weight))
    .attr("stroke-width", d => wScale(d.weight));

  nodeG = g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r", d => rScale(d.count)).attr("fill", d => d.color)
    .attr("stroke", "#fff").attr("stroke-width", 0.5).attr("opacity", 0.9)
    .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd))
    .on("mouseover", (e, d) => {
      tooltip.style("display", "block").html(
        `<b>${d.id}</b><br>Упоминаний: ${d.count}<br>Категория: ${d.category_label}`
      );
      highlightNeighbors(d);
    })
    .on("mousemove", (e) => tooltip.style("left", e.pageX+12+"px").style("top", e.pageY-20+"px"))
    .on("mouseout", () => { tooltip.style("display", "none"); resetHighlight(); });

  labelG = g.append("g").selectAll("text").data(nodes.filter(d => d.count >= 20)).join("text")
    .text(d => d.id).attr("font-size", d => Math.max(8, Math.min(14, rScale(d.count) * 0.7)))
    .attr("fill", "#ccc").attr("text-anchor", "middle").attr("dy", d => rScale(d.count) + 12)
    .style("pointer-events", "none");

  simulation.on("tick", () => {
    linkG.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
    nodeG.attr("cx", d=>d.x).attr("cy", d=>d.y);
    labelG.attr("x", d=>d.x).attr("y", d=>d.y);
  });
}

function highlightNeighbors(d) {
  const neighbors = new Set();
  linkG.each(function(l) {
    if (l.source.id === d.id) neighbors.add(l.target.id);
    if (l.target.id === d.id) neighbors.add(l.source.id);
  });
  neighbors.add(d.id);
  nodeG.attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1);
  linkG.attr("stroke-opacity", l => (l.source.id===d.id||l.target.id===d.id) ? 0.8 : 0.03);
  labelG.attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1);
}

function resetHighlight() {
  nodeG.attr("opacity", 0.9);
  linkG.attr("stroke-opacity", d => 0.3);
  labelG.attr("opacity", 1);
}

function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

  // Управление
d3.select("#weightSlider").on("input", function() {
  const v = +this.value;
  d3.select("#weightVal").text(v);
  render(v);
});

d3.select("#search").on("input", function() {
  const q = this.value.toLowerCase();
  if (!q) { resetHighlight(); return; }
  const match = fullData.nodes.find(n => n.id.toLowerCase().includes(q));
  if (match) highlightNeighbors(match);
});

  // Первичная отрисовка
render(5);
</script>
</body>
</html>
