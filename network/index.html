weight": 2}, {"source": "ВТБ", "target": "Сбер", "weight": 3}, {"source": "Московская биржа", "target": "ПИК", "weight": 2}, {"source": "Московская биржа", "target": "Сбер", "weight": 4}, {"source": "Московская биржа", "target": "Селектел", "weight": 2}, {"source": "ПИК", "target": "Сбер", "weight": 2}, {"source": "Московская биржа", "target": "Перекрёсток", "weight": 2}, {"source": "Московская биржа", "target": "Пятёрочка", "weight": 2}, {"source": "Перекрёсток", "target": "Пятёрочка", "weight": 2}, {"source": "Перекрёсток", "target": "Россия", "weight": 2}, {"source": "Пятёрочка", "target": "Россия", "weight": 2}, {"source": "223-ФЗ", "target": "44-ФЗ", "weight": 2}, {"source": "223-ФЗ", "target": "Московская биржа", "weight": 2}, {"source": "44-ФЗ", "target": "Московская биржа", "weight": 2}, {"source": "Kaspersky", "target": "Московская биржа", "weight": 2}, {"source": "Yandex Облако", "target": "Яндекс", "weight": 2}, {"source": "Ericsson", "target": "Huawei", "weight": 2}, {"source": "Ericsson", "target": "МТС", "weight": 2}, {"source": "Ericsson", "target": "Россия", "weight": 2}, {"source": "Huawei", "target": "МТС", "weight": 2}, {"source": "Huawei", "target": "Россия", "weight": 2}, {"source": "МТС", "target": "Россия", "weight": 3}, {"source": "Газпром", "target": "СИБУР", "weight": 2}, {"source": "Россия", "target": "СИБУР", "weight": 3}, {"source": "Россия", "target": "Силовые машины", "weight": 3}, {"source": "Россия", "target": "ФосАгро", "weight": 2}, {"source": "НЛМК", "target": "ОМК", "weight": 2}, {"source": "НЛМК", "target": "РЖД", "weight": 2}, {"source": "НЛМК", "target": "Россия", "weight": 2}, {"source": "ОМК", "target": "РЖД", "weight": 3}, {"source": "ОМК", "target": "Россия", "weight": 3}, {"source": "ОМК", "target": "ТМК", "weight": 2}, {"source": "РЖД", "target": "Россия", "weight": 5}, {"source": "РЖД", "target": "ТМК", "weight": 2}, {"source": "Россия", "target": "ТМК", "weight": 3}, {"source": "Мурманская область", "target": "Россия", "weight": 2}, {"source": "MOEX", "target": "МТС", "weight": 2}, {"source": "ВТБ", "target": "Россия", "weight": 3}, {"source": "МТС", "target": "Ростелеком", "weight": 2}, {"source": "MOEX", "target": "Сбер", "weight": 2}, {"source": "Московская биржа", "target": "Сбер Страхование", "weight": 2}, {"source": "Россия", "target": "Сбер", "weight": 4}, {"source": "Россия", "target": "Сбер Страхование", "weight": 2}, {"source": "ЛСР", "target": "ПИК", "weight": 2}, {"source": "ЛСР", "target": "Россия", "weight": 2}, {"source": "ПИК", "target": "Россия", "weight": 2}, {"source": "MOEX", "target": "Газпром", "weight": 2}, {"source": "MOEX", "target": "Лукойл", "weight": 2}, {"source": "Лукойл", "target": "Московская биржа", "weight": 2}, {"source": "Лукойл", "target": "Россия", "weight": 2}, {"source": "Московская биржа", "target": "Роснефть", "weight": 2}, {"source": "Роснефть", "target": "Россия", "weight": 3}, {"source": "Китай", "target": "Россия", "weight": 2}, {"source": "Китай", "target": "СИБУР", "weight": 2}, {"source": "Евросибэнерго", "target": "Россия", "weight": 2}, {"source": "Норникель", "target": "Россия", "weight": 2}]};
const width = window.innerWidth, height = window.innerHeight;

const svg = d3.select("svg");
const g = svg.append("g");

  // Масштабирование
svg.call(d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => g.attr("transform", e.transform)));

const tooltip = d3.select("#tooltip");
let simulation, linkG, nodeG, labelG;

function render(minWeight) {
  const links = fullData.links.filter(l => l.weight >= minWeight);
  const activeIds = new Set();
  links.forEach(l => { activeIds.add(l.source.id || l.source); activeIds.add(l.target.id || l.target); });
  const nodes = fullData.nodes.filter(n => activeIds.has(n.id));

  d3.select("#stats").html(`Узлы: ${nodes.length} | Связи: ${links.length}`);

  g.selectAll("*").remove();

  // Масштаб
  const maxCount = d3.max(nodes, d => d.count) || 1;
  const rScale = d3.scaleSqrt().domain([1, maxCount]).range([4, 40]);
  const maxWeight = d3.max(links, l => l.weight) || 1;
  const wScale = d3.scaleLinear().domain([minWeight, maxWeight]).range([0.5, 4]);
  const oScale = d3.scaleLinear().domain([minWeight, maxWeight]).range([0.15, 0.6]);

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80).strength(0.3))
    .force("charge", d3.forceManyBody().strength(-150))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => rScale(d.count) + 2));

  linkG = g.append("g").selectAll("line").data(links).join("line")
    .attr("stroke", "#555").attr("stroke-opacity", d => oScale(d.weight))
    .attr("stroke-width", d => wScale(d.weight));

  nodeG = g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r", d => rScale(d.count)).attr("fill", d => d.color)
    .attr("stroke", "#fff").attr("stroke-width", 0.5).attr("opacity", 0.9)
    .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd))
    .on("mouseover", (e, d) => {
      tooltip.style("display", "block").html(
        `<b>${d.id}</b><br>Упоминаний: ${d.count}<br>Категория: ${d.category_label}`
      );
      highlightNeighbors(d);
    })
    .on("mousemove", (e) => tooltip.style("left", e.pageX+12+"px").style("top", e.pageY-20+"px"))
    .on("mouseout", () => { tooltip.style("display", "none"); resetHighlight(); });

  labelG = g.append("g").selectAll("text").data(nodes.filter(d => d.count >= 20)).join("text")
    .text(d => d.id).attr("font-size", d => Math.max(8, Math.min(14, rScale(d.count) * 0.7)))
    .attr("fill", "#ccc").attr("text-anchor", "middle").attr("dy", d => rScale(d.count) + 12)
    .style("pointer-events", "none");

  simulation.on("tick", () => {
    linkG.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
    nodeG.attr("cx", d=>d.x).attr("cy", d=>d.y);
    labelG.attr("x", d=>d.x).attr("y", d=>d.y);
  });
}

function highlightNeighbors(d) {
  const neighbors = new Set();
  linkG.each(function(l) {
    if (l.source.id === d.id) neighbors.add(l.target.id);
    if (l.target.id === d.id) neighbors.add(l.source.id);
  });
  neighbors.add(d.id);
  nodeG.attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1);
  linkG.attr("stroke-opacity", l => (l.source.id===d.id||l.target.id===d.id) ? 0.8 : 0.03);
  labelG.attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1);
}

function resetHighlight() {
  nodeG.attr("opacity", 0.9);
  linkG.attr("stroke-opacity", d => 0.3);
  labelG.attr("opacity", 1);
}

function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

  // Управление
d3.select("#weightSlider").on("input", function() {
  const v = +this.value;
  d3.select("#weightVal").text(v);
  render(v);
});

d3.select("#search").on("input", function() {
  const q = this.value.toLowerCase();
  if (!q) { resetHighlight(); return; }
  const match = fullData.nodes.find(n => n.id.toLowerCase().includes(q));
  if (match) highlightNeighbors(match);
});

  // Первичная отрисовка
render(5);
</script>
</body>
</html>
